workflows:
  # ─────────────────────────────────────────
  # iOS Debug build
  # ─────────────────────────────────────────
  ios-debug:
    name: RupeeLedger iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.16.0
      xcode: 16.4
      cocoapods: default
      vars:
        APP_ID: com.rupeeledger.app
        APP_NAME: RupeeLedger

    scripts:
      - name: Check environment
        script: |
          node --version
          npm --version
          xcodebuild -version
          pod --version

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          node build-api.js
          npx vite build

      - name: Add iOS platform (fresh)
        script: |
          set -e
          # Always remove and recreate to guarantee Podfile is generated
          rm -rf ios/
          echo "=== Running npx cap add ios ==="
          npx cap add ios 2>&1
          echo ""
          echo "=== Verifying Podfile was created ==="
          if [ -f "ios/App/Podfile" ]; then
            echo "✓ Podfile found!"
            cat ios/App/Podfile
          else
            echo "FATAL: Podfile not created by cap add ios"
            echo "ios/ contents:"
            ls -la ios/ 2>/dev/null || echo "No ios dir"
            echo "ios/App/ contents:"
            ls -la ios/App/ 2>/dev/null || echo "No ios/App dir"
            exit 1
          fi

      - name: Sync Capacitor to iOS
        script: |
          set -e
          npx cap sync ios
          echo "=== ios/App after sync ==="
          ls -la ios/App/

      - name: Install CocoaPods
        script: |
          set -e
          cd ios/App
          echo "=== Running pod install ==="
          pod install --repo-update 2>&1

      - name: Build iOS (Debug - unsigned)
        script: |
          set -e
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1 | tail -80

      - name: Export IPA
        script: |
          set -e
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -30
          echo "=== IPA artifacts ==="
          find "$CM_BUILD_DIR" -name "*.ipa" 2>/dev/null && echo "IPA ready!" || echo "No IPA found"

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/**/*.xcarchive

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────
  # Android Debug build
  # ─────────────────────────────────────────
  android-debug:
    name: RupeeLedger Android Debug
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      node: 22.16.0
      java: 21

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          node build-api.js
          npx vite build

      - name: Sync Capacitor to Android
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true
