workflows:
  # ─────────────────────────────────────────
  # iOS Debug build — Capacitor 8 uses SPM
  # ─────────────────────────────────────────
  ios-debug:
    name: RupeeLedger iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.16.0
      xcode: 16.4
      vars:
        APP_ID: com.rupeeledger.app
        APP_NAME: RupeeLedger

    scripts:
      - name: Check environment
        script: |
          node --version
          npm --version
          xcodebuild -version

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          node build-api.js
          npx vite build

      - name: Add iOS platform (fresh)
        script: |
          set -e
          rm -rf ios/
          echo "=== Running npx cap add ios ==="
          npx cap add ios 2>&1
          echo ""
          echo "=== iOS project structure ==="
          ls -la ios/App/
          echo "=== Capacitor 8 uses SPM — checking Package.swift ==="
          ls -la ios/App/CapApp-SPM/ 2>/dev/null || echo "No CapApp-SPM dir"

      - name: Sync Capacitor to iOS
        script: |
          set -e
          npx cap sync ios
          echo "=== Final ios/App contents ==="
          ls -la ios/App/

      - name: Resolve Swift Package Manager dependencies
        script: |
          set -e
          cd ios/App
          echo "=== Resolving SPM packages ==="
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -resolvePackageDependencies \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" 2>&1 | tail -30

      - name: Build iOS (Debug - unsigned)
        script: |
          set -e
          cd ios/App
          echo "=== Building with SPM (no CocoaPods) ==="
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1 | tail -80

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -30
          echo "=== IPA artifacts ==="
          find "$CM_BUILD_DIR" -name "*.ipa" 2>/dev/null && echo "IPA ready!" || echo "Check xcarchive"

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/**/*.xcarchive

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────
  # Android Debug build
  # ─────────────────────────────────────────
  android-debug:
    name: RupeeLedger Android Debug
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      node: 22.16.0
      java: 21

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          node build-api.js
          npx vite build

      - name: Sync Capacitor to Android
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true
