workflows:
  # ─────────────────────────────────────────
  # iOS Debug build
  # ─────────────────────────────────────────
  ios-debug:
    name: RupeeLedger iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.16.0
      xcode: 16.4
      cocoapods: default
      vars:
        APP_ID: com.rupeeledger.app
        APP_NAME: RupeeLedger

    scripts:
      - name: Set Node version
        script: |
          node --version
          npm --version

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          node build-api.js
          npx vite build

      - name: Add iOS platform (if not exists)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor to iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS (Debug IPA - no code signing)
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGNING_ALLOWED=NO || true

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/**/*.xcarchive

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────
  # Android Debug build
  # ─────────────────────────────────────────
  android-debug:
    name: RupeeLedger Android Debug
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      node: 22.16.0
      java: 21

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          node build-api.js
          npx vite build

      - name: Add Android platform (if not exists)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor to Android
        script: npx cap sync android

      - name: Build Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true
