workflows:
  # ─────────────────────────────────────────
  # iOS Debug build
  # ─────────────────────────────────────────
  ios-debug:
    name: RupeeLedger iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.16.0
      xcode: 16.4
      cocoapods: default
      vars:
        APP_ID: com.rupeeledger.app
        APP_NAME: RupeeLedger

    scripts:
      - name: Check environment
        script: |
          node --version
          npm --version
          xcodebuild -version
          pod --version
          echo "Architecture: $(uname -m)"

      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          node build-api.js
          npx vite build

      - name: Add iOS platform
        script: |
          set -e
          if [ ! -d "ios" ]; then
            echo "Adding iOS platform..."
            npx cap add ios
          else
            echo "iOS platform already exists."
          fi
          echo "=== iOS directory ==="
          ls -la ios/

      - name: Sync Capacitor to iOS
        script: |
          set -e
          npx cap sync ios
          echo "=== ios/App contents ==="
          ls -la ios/App/

      - name: Install CocoaPods
        script: |
          set -e
          echo "=== Podfile ==="
          cat ios/App/Podfile
          echo ""
          echo "=== Running pod install ==="
          cd ios/App
          # Use --repo-update to ensure fresh specs on CI
          # Use sudo if needed, log verbose output
          pod install --repo-update --verbose 2>&1 || {
            echo "pod install failed — trying with sudo..."
            sudo pod install --repo-update --verbose 2>&1
          }

      - name: Build iOS (Debug - unsigned)
        script: |
          set -e
          cd ios/App
          echo "=== Workspace check ==="
          ls -la
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1 | tail -100

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist exportOptions.plist \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tail -50
          echo "=== Looking for IPA ==="
          find "$CM_BUILD_DIR" -name "*.ipa" 2>/dev/null && echo "IPA found!" || echo "No IPA — check xcarchive"

    artifacts:
      - $CM_BUILD_DIR/**/*.ipa
      - $CM_BUILD_DIR/**/*.xcarchive

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────
  # Android Debug build
  # ─────────────────────────────────────────
  android-debug:
    name: RupeeLedger Android Debug
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      node: 22.16.0
      java: 21

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          node build-api.js
          npx vite build

      - name: Add Android platform (if not exists)
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor to Android
        script: npx cap sync android

      - name: Build Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - YOUR_EMAIL@gmail.com
        notify:
          success: true
          failure: true
